name: Build macOS .app/.dmg

# 在 macos runner 上用 Nuitka 打包 Gitora 为 .app + .dmg(未签名)。
# Nuitka 不能交叉编译 mac,故必须在 macOS 上构建。产物作为 artifact 下载。
on:
  workflow_dispatch:      # 手动触发(打包慢,不随 push 自动跑)
    inputs:
      release_tag:
        description: "要把 dmg 附加到的 Release tag(如 v1.1.0);留空则只产出 artifact 不发 Release"
        required: false
        default: ""

permissions:
  contents: write         # 需要写权限才能上传到 Release

jobs:
  build-mac:
    name: Build macOS app
    runs-on: macos-14     # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app_qml/requirements.txt
          # imageio: Nuitka 把 logo.png 自动转 .icns 图标所需
          pip install nuitka imageio

      - name: Build .app with Nuitka
        run: python build_nuitka_mac.py

      - name: Post-process .app (清脏文件 → 重签 → 打 dmg)
        run: |
          APP="build_dist/main_qml.app"
          if [ ! -d "$APP" ]; then echo "::error::Nuitka 未生成 .app"; ls -R build_dist | head -40; exit 1; fi

          echo "=== 1. 删除导致 codesign 失败的 Qt 构建残留/实验模块 ==="
          # assetdownloader 是 Qt labs 实验模块(Gitora 不用);objects-* 是构建中间产物。
          # 它们含非 bundle 格式文件(.qt),codesign --deep 不认。Gitora 用不到,直接删。
          find "$APP/Contents/MacOS/PySide6/qml" -type d -name "assetdownloader" -prune -exec rm -rf {} + 2>/dev/null || true
          find "$APP/Contents/MacOS/PySide6/qml" -type d -name "objects-*" -prune -exec rm -rf {} + 2>/dev/null || true
          # 兜底:删掉所有 .qt 这类 codesign 不认的文件
          find "$APP/Contents/MacOS/PySide6/qml" -name "*.qt" -delete 2>/dev/null || true
          echo "残留 assetdownloader:"; find "$APP" -name "assetdownloader" -type d | head || echo "(已清)"

          echo "=== 2. ad-hoc 重新签名整个 .app(覆盖 Nuitka 半成品签名) ==="
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --verbose=2 "$APP" && echo "签名校验通过"

          echo "=== 3. 用 hdiutil 打 dmg(mac 自带,不依赖 create-dmg) ==="
          mkdir -p dmg_stage
          cp -R "$APP" dmg_stage/Gitora.app
          ln -s /Applications dmg_stage/Applications
          hdiutil create -volname "Gitora" -srcfolder dmg_stage -ov -format UDZO "build_dist/Gitora-macOS.dmg"
          echo "=== dmg 产物 ==="; ls -lh build_dist/*.dmg

      - name: Packaged AI connection and headless SELFTEST
        run: |
          set -o pipefail
          APP_BIN="build_dist/main_qml.app/Contents/MacOS/Gitora"
          if [ ! -f "$APP_BIN" ]; then echo "::error::未找到 .app 主程序: $APP_BIN"; exit 1; fi
          python tools/packaged_ai_connection_selftest.py --executable "$APP_BIN" 2>&1 | tee selftest.log
          if grep -qE "rootObjects = [1-9]" selftest.log \
              && grep -q "AI 连接检测成功" selftest.log; then
            echo "SELFTEST passed"
          else
            echo "::error::打包产物 SELFTEST 失败"; exit 1
          fi

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v7
        with:
          name: Gitora-macOS-unsigned
          path: build_dist/*.dmg
          if-no-files-found: warn

      - name: Upload .app artifact (fallback)
        uses: actions/upload-artifact@v7
        with:
          name: Gitora-macOS-app
          path: build_dist/main_qml.app
          if-no-files-found: warn

      # 若指定了 release_tag,直接在 runner 上把 dmg 附加到对应 Release。
      # GitHub 内网上传,秒传,避免本地慢速上行带宽卡住大文件。
      - name: Attach dmg to Release
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ inputs.release_tag }}"
          VER="${TAG#v}"
          SRC=$(ls build_dist/*.dmg | head -1)
          DEST="Gitora-macOS-${VER}.dmg"
          cp "$SRC" "$DEST"
          echo "上传 $DEST 到 Release $TAG"
          gh release upload "$TAG" "$DEST" --repo "${{ github.repository }}" --clobber
