name: Build macOS .app/.dmg

# 在 macos runner 上用 Nuitka 打包 Gitora 为 .app + .dmg(未签名)。
# Nuitka 不能交叉编译 mac,故必须在 macOS 上构建。产物作为 artifact 下载。
on:
  workflow_dispatch:      # 手动触发(打包慢,不随 push 自动跑)

jobs:
  build-mac:
    name: Build macOS app
    runs-on: macos-14     # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app_qml/requirements.txt
          pip install nuitka

      - name: Build .app + .dmg with Nuitka
        run: python build_nuitka_mac.py

      - name: Headless SELFTEST on built .app
        env:
          GITESS_QML_SELFTEST: "1"
          QT_QPA_PLATFORM: offscreen
        run: |
          APP_BIN="build_dist/main_qml.app/Contents/MacOS/Gitora"
          if [ ! -f "$APP_BIN" ]; then echo "❌ 未找到 .app 主程序: $APP_BIN"; ls -R build_dist | head -40; exit 1; fi
          "$APP_BIN" 2>&1 | tee selftest.log || true
          if grep -qE "rootObjects = [1-9]" selftest.log; then
            echo "✅ 打包产物 SELFTEST 通过"
          else
            echo "❌ 打包产物 SELFTEST 失败"; exit 1
          fi

      - name: List build artifacts
        run: |
          echo "=== build_dist 产物 ==="
          ls -lh build_dist/ | grep -iE "\.app|\.dmg" || ls -lh build_dist/

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gitora-macOS-unsigned
          path: |
            build_dist/*.dmg
          if-no-files-found: warn

      - name: Upload .app artifact (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: Gitora-macOS-app
          path: build_dist/main_qml.app
          if-no-files-found: warn
