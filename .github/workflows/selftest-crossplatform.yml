name: Cross-platform SELFTEST

# 验证 Gitora 能在 macOS(及 Linux)上加载运行 —— 纯 headless SELFTEST,不打包不签名。
# 目的:确认 PrismQML 引擎的平台守卫在非 Windows 上是否完整(Gitora 能否起得来)。
on:
  workflow_dispatch:      # 手动触发
  push:
    paths:
      - 'app_qml/**'
      - 'app/**'
      - '.github/workflows/selftest-crossplatform.yml'

jobs:
  selftest:
    name: SELFTEST on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app_qml/requirements.txt

      - name: Install Qt offscreen deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Run headless SELFTEST
        env:
          GITESS_QML_SELFTEST: "1"
          QT_QPA_PLATFORM: offscreen
        run: |
          python app_qml/main_qml.py 2>&1 | tee selftest.log
          # SELFTEST 成功标志:输出含 "rootObjects = N"(N>=1);找不到则失败
          if grep -qE "rootObjects = [1-9]" selftest.log; then
            echo "✅ SELFTEST passed on ${{ matrix.os }}"
          else
            echo "❌ SELFTEST failed: rootObjects 未就绪 (引擎平台守卫可能有缺口)"
            exit 1
          fi
